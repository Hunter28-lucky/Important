; php.ini config file for TemplateLink Builder (Wasmer WASM environment)
display_errors = Off
display_startup_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On

; Upload settings for webcam base64 photo payloads
upload_max_filesize = 16M
post_max_size = 16M
memory_limit = 128M
date.timezone = UTC
default_charset = "UTF-8"
